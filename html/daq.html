<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LCR Meter DAQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f1115; --card: #151923; --text: #e6e8ee; --muted:#9aa3b2;
      --accent:#6ea8fe; --ok:#31c48d; --warn:#f0ad4e; --border:#242a36;
    }
    * { box-sizing: border-box; }
    body { margin:0; padding:24px; font-family: system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    a { color: var(--accent); text-decoration: none; }
    nav { display:flex; gap:20px; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .card h3 { margin:0 0 12px; font-size:1.05rem; color:var(--muted); }
    label { display:block; color:var(--muted); margin-top:10px; }
    input, select {
      width:100%; background:#0c0f14; color:var(--text); border:1px solid var(--border);
      border-radius:10px; padding:6px 10px; margin-top:5px;
    }
    button { background:#1f2a3b; color:var(--text); border:1px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer; margin-top:12px; }
    button:hover { border-color: var(--accent); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:#0c0f14; font-size:0.9rem; color:var(--muted); }
    .pill.ok { border-color: var(--ok); color: var(--ok); }
    .pill.err { border-color: #ff5c5c; color: #ff5c5c; }
    pre { background:#0c0f14; border:1px solid var(--border); padding:8px; border-radius:10px; overflow:auto; min-height:60px; }
    .big { font-size:1.4rem; font-weight:600; margin:6px 0; }
  </style>
</head>
<body>
  <nav>
    <strong>HALO</strong>
    <a href="/">Motor Dashboard</a>
    <a href="/daq">LCR Meter DAQ</a>
    <span id="ConnNote" class="pill">DAQ: idle</span>
  </nav>

  <div class="grid">
    <!-- Setup Card -->
    <div class="card">
      <h3>Recording Setup</h3>

      <label for="Mode">Measurement Mode</label>
      <select id="Mode">
        <option value="RX">RX (Resistance + Reactance)</option>
        <option value="ZTD">ZTD (Impedance + Phase deg)</option>
        <option value="CPD">CPD (Capacitance + Dissipation)</option>
        <option value="CPQ">CPQ (Capacitance + Q Factor)</option>
        <option value="CPRP">CPRP (Capacitance + Rp)</option>
        <option value="LSRS">LSRS (Inductance + Rs)</option>
        <option value="LPRP">LPRP (Inductance + Rp)</option>
        <option value="ZTR">ZTR (Impedance + Phase rad)</option>
      </select>

      <label for="Freq">Test Frequency (Hz)</label>
      <input id="Freq" type="number" step="1" min="100" max="200000" value="1000" />

      <label for="Voltage">AC Test Voltage (V)</label>
      <input id="Voltage" type="number" step="0.01" min="0.01" max="2.0" value="1.0" />

      <label for="Interval">Recording Interval (s)</label>
      <input id="Interval" type="number" step="0.01" min="0.05" value="0.5" />

      <label for="FileName">CSV file</label>
      <input id="FileName" type="text" value="measurements.csv" />

      <div class="row">
        <button onclick="ConnectLcr()">Connect</button>
        <button onclick="StartDaq()">Start Recording</button>
        <button onclick="StopDaq()">Stop Recording</button>
        <button onclick="SingleMeasure()">Single Shot</button>
      </div>
      <div class="row">
        <span class="pill">Status: <span id="StatusText">Idle</span></span>
        <span id="DevicePill" class="pill">device: --</span>
      </div>
    </div>

    <!-- Live Data Card -->
    <div class="card">
      <h3>Live Data</h3>
      <div id="ModeBadge" class="pill" style="margin-bottom:8px">Mode: --</div>
      <div class="big" id="PrimaryVal">Primary: --</div>
      <div class="big" id="SecondaryVal">Secondary: --</div>
      <div style="margin-top:8px">
        <span id="StatusBadge" class="pill">Status: --</span>
        <span id="TimeBadge" class="pill">t = -- s</span>
      </div>
      <h3 style="margin-top:16px">Raw Response</h3>
      <pre id="LiveBox">--</pre>
    </div>
  </div>

<script>
  async function RequestJson(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function SetConnNote(s, ok){
    const el = document.getElementById("ConnNote");
    el.textContent = `DAQ: ${s}`;
    el.className = ok ? "pill ok" : "pill";
  }

  async function ConnectLcr(){
    try {
      const js = await RequestJson("/daq/connect");
      if (js.ok) {
        document.getElementById("StatusText").textContent = "Connected";
        document.getElementById("DevicePill").textContent = `device: ${js.device}`;
        SetConnNote("connected", true);
      } else {
        document.getElementById("StatusText").textContent = js.error || "Error";
        SetConnNote("error", false);
      }
    } catch(e) {
      document.getElementById("StatusText").textContent = "Connection failed";
      SetConnNote("error", false);
      alert(`Connect failed: ${e.message}`);
    }
  }

  async function StartDaq(){
    const qs = new URLSearchParams({
      file:     document.getElementById("FileName").value || "measurements.csv",
      interval: document.getElementById("Interval").value || "0.5",
      mode:     document.getElementById("Mode").value,
      freq:     document.getElementById("Freq").value,
      voltage:  document.getElementById("Voltage").value,
    }).toString();

    try {
      const js = await RequestJson(`/daq/start?${qs}`);
      if (js.ok) {
        document.getElementById("StatusText").textContent = "Recording...";
        SetConnNote("recording", true);
      } else {
        document.getElementById("StatusText").textContent = js.error || "Error";
        SetConnNote("error", false);
        alert(`Start failed: ${js.error}`);
      }
    } catch(e) {
      document.getElementById("StatusText").textContent = "Error";
      SetConnNote("error", false);
      alert(`Start failed: ${e.message}`);
    }
  }

  async function StopDaq(){
    try {
      await RequestJson("/daq/stop");
      document.getElementById("StatusText").textContent = "Stopped";
      SetConnNote("stopped", false);
    } catch(e) {
      alert(`Stop failed: ${e.message}`);
    }
  }

  async function SingleMeasure(){
    try {
      const js = await RequestJson("/daq/measure");
      if (js.error) {
        alert(`Measure failed: ${js.error}`);
        return;
      }
      UpdateDisplay(js);
    } catch(e) {
      alert(`Measure failed: ${e.message}`);
    }
  }

  function FormatValue(val, mode, which){
    if (val == null) return "--";
    const v = Number(val);
    // Capacitance modes: show nF or pF
    if (which === "primary" && mode && mode.startsWith("C")) {
      if (Math.abs(v) < 1e-9) return `${(v*1e12).toFixed(3)} pF`;
      return `${(v*1e9).toFixed(3)} nF`;
    }
    // Inductance modes: show uH or mH
    if (which === "primary" && mode && mode.startsWith("L")) {
      if (Math.abs(v) < 1e-3) return `${(v*1e6).toFixed(3)} uH`;
      return `${(v*1e3).toFixed(3)} mH`;
    }
    // Impedance/resistance: show Ohm
    if (which === "primary" && (mode === "RX" || mode === "ZTD" || mode === "ZTR")) {
      return `${v.toExponential(4)} Ohm`;
    }
    return v.toExponential(4);
  }

  function UpdateDisplay(js){
    const mode = js.mode || "--";
    document.getElementById("ModeBadge").textContent = `Mode: ${mode}`;
    document.getElementById("PrimaryVal").textContent =
      `Primary: ${FormatValue(js.primary, mode, "primary")}`;
    document.getElementById("SecondaryVal").textContent =
      `Secondary: ${FormatValue(js.secondary, mode, "secondary")}`;

    const sBadge = document.getElementById("StatusBadge");
    if (js.status != null) {
      sBadge.textContent = js.status === 0 ? "Status: OK" : `Status: ${js.status}`;
      sBadge.className = js.status === 0 ? "pill ok" : "pill err";
    }
    if (js.timestamp != null) {
      document.getElementById("TimeBadge").textContent = `t = ${Number(js.timestamp).toFixed(3)} s`;
    }
    document.getElementById("LiveBox").textContent = JSON.stringify(js, null, 2);
  }

  // Poll live data every second while recording
  async function FetchLiveData(){
    try {
      const js = await RequestJson("/daq/data");
      if (js && js.timestamp != null) {
        UpdateDisplay(js);
        SetConnNote("recording", true);
      }
    } catch(e) {
      // silent -- instrument may not be connected
    }
  }
  setInterval(FetchLiveData, 1000);

  // Check connection status on load
  (async function(){
    try {
      const js = await RequestJson("/daq/status");
      if (js.connected) {
        document.getElementById("DevicePill").textContent = `device: ${js.device}`;
        SetConnNote(js.recording ? "recording" : "connected", js.connected);
        document.getElementById("StatusText").textContent = js.recording ? "Recording..." : "Connected";
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
