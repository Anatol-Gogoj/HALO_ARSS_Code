<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LCR Meter DAQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f1115; --card: #151923; --text: #e6e8ee; --muted:#9aa3b2;
      --accent:#6ea8fe; --ok:#31c48d; --warn:#f0ad4e; --border:#242a36;
    }
    * { box-sizing: border-box; }
    body { margin:0; padding:24px; font-family: system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    a { color: var(--accent); text-decoration: none; }
    nav { display:flex; gap:20px; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .card h3 { margin:0 0 12px; font-size:1.05rem; color:var(--muted); }
    label { display:block; color:var(--muted); margin-top:10px; }
    input, select {
      width:100%; background:#0c0f14; color:var(--text); border:1px solid var(--border);
      border-radius:10px; padding:6px 10px; margin-top:5px;
    }
    button { background:#1f2a3b; color:var(--text); border:1px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer; margin-top:12px; }
    button:hover { border-color: var(--accent); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:#0c0f14; font-size:0.9rem; color:var(--muted); }
    pre { background:#0c0f14; border:1px solid var(--border); padding:8px; border-radius:10px; overflow:auto; }
  </style>
</head>
<body>
  <nav>
    <strong>HALO</strong>
    <a href="/">Motor Dashboard</a>
    <a href="/daq">LCR Meter DAQ</a>
    <span id="ConnNote" class="pill">DAQ: idle</span>
  </nav>

  <div class="grid">
    <div class="card">
      <h3>Recording Setup</h3>
      <!-- Keep advanced fields for future use; backend will ignore unknown params -->
      <label for="Mode">Measurement Mode</label>
      <select id="Mode">
        <option value="R-X">R-X</option>
        <option value="Z-deg">Z-deg</option>
        <option value="C">Capacitance</option>
        <option value="L">Inductance</option>
        <option value="Q">Quality Factor</option>
        <option value="D">Dissipation Factor</option>
        <option value="DCR">DCR</option>
      </select>

      <label for="Freq">Sampling Frequency (Hz)</label>
      <input id="Freq" type="number" step="1" value="1000" />

      <label for="Voltage">AC Test Voltage (V)</label>
      <input id="Voltage" type="number" step="0.001" value="1.0" />

      <label for="Speed">Measurement Speed</label>
      <select id="Speed">
        <option value="low">Low</option>
        <option value="med" selected>Medium</option>
        <option value="fast">Fast</option>
      </select>

      <label for="Interval">Recording Interval (s)</label>
      <input id="Interval" type="number" step="0.01" value="0.5" />

      <label for="FileName">CSV file</label>
      <input id="FileName" type="text" value="measurements.csv" />

      <div class="row">
        <button onclick="StartDaq()">Start</button>
        <button onclick="StopDaq()">Stop</button>
      </div>
      <div class="row">
        <span class="pill">Status: <span id="StatusText">Idle</span></span>
      </div>
    </div>

    <div class="card">
      <h3>Live Data</h3>
      <pre id="LiveBox">--</pre>
    </div>
  </div>

<script>
  async function RequestJson(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
  async function RequestOk(url, opts) {
    const r = await fetch(url, {cache:"no-store", ...(opts||{})});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json().catch(_=> ({}));
  }

  function SetConnNote(s){ document.getElementById("ConnNote").textContent = `DAQ: ${s}`; }

  // NOTE: Your current Flask DAQ endpoints accept GETs (/daq/start?file=...&interval=...).
  // We pass other fields too (backend may ignore them unless you extend it).
  async function StartDaq(){
    const interval = document.getElementById("Interval").value || "0.5";
    const file = encodeURIComponent(document.getElementById("FileName").value || "measurements.csv");
    const qs = new URLSearchParams({
      file: file, interval: interval,
      mode: document.getElementById("Mode").value,
      freq: document.getElementById("Freq").value,
      voltage: document.getElementById("Voltage").value,
      speed: document.getElementById("Speed").value
    }).toString();

    try {
      await RequestOk(`/daq/start?${qs}`);
      document.getElementById("StatusText").textContent = "Recording…";
      SetConnNote("recording");
    } catch(e) {
      document.getElementById("StatusText").textContent = "Error";
      SetConnNote("error");
      alert(`Start failed: ${e.message}`);
    }
  }

  async function StopDaq(){
    try {
      await RequestOk(`/daq/stop`);
      document.getElementById("StatusText").textContent = "Stopped";
      SetConnNote("stopped");
    } catch(e) {
      document.getElementById("StatusText").textContent = "Error";
      SetConnNote("error");
      alert(`Stop failed: ${e.message}`);
    }
  }

  async function FetchLiveData(){
    try {
      const js = await RequestJson(`/daq/data`);
      const box = document.getElementById("LiveBox");
      if (js && js.timestamp != null) {
        box.textContent = `Time: ${Number(js.timestamp).toFixed(3)} s\nValue: ${js.value}`;
        SetConnNote("online");
      } else {
        box.textContent = "--";
      }
    } catch(e) {
      document.getElementById("LiveBox").textContent = "--";
      SetConnNote("offline");
    }
  }

  setInterval(FetchLiveData, 1000);
  FetchLiveData();
</script>
</body>
</html>
