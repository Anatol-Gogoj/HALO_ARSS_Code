<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HALO Motor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --card: #151923;
      --text: #e6e8ee;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
      --ok: #31c48d;
      --warn: #f0ad4e;
      --err: #e55353;
      --border: #242a36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text);
    }
    a { color: var(--accent); text-decoration: none; }
    nav {
      display: flex; gap: 20px; align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px; margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .card h3 { margin: 0 0 12px; font-size: 1.05rem; color: var(--muted); }
    label { display: inline-block; min-width: 140px; color: var(--muted); }
    input, select {
      background: #0c0f14; color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 10px; min-width: 120px;
    }
    button {
      background: #1f2a3b; color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; }
    .ok   { background: var(--ok); }
    .warn { background: var(--warn); }
    .err  { background: var(--err); }
    pre { background:#0c0f14; border:1px solid var(--border); padding:8px; border-radius:10px; overflow:auto; }
    img { max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }
    .small { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav>
    <strong>HALO</strong>
    <a href="/">Motor Dashboard</a>
    <a href="/daq">LCR Meter DAQ</a>
    <span id="ConnNote" class="small">Backend: connecting…</span>
  </nav>

  <div class="grid">
    <div class="card">
      <h3>Motor Control</h3>
      <div class="row">
        <label for="FreqHz">Frequency (Hz)</label>
        <input id="FreqHz" type="number" step="0.1" value="5" />
        <button onclick="SetFreqAndStart()">Set & Start</button>
      </div>
      <div class="row" style="margin-top:8px">
        <label for="RpmVal">RPM</label>
        <input id="RpmVal" type="number" step="1" value="60" />
        <button onclick="SetRpm()">Set</button>
      </div>
      <div class="row" style="margin-top:8px">
        <label for="DirVal">Direction</label>
        <select id="DirVal">
          <option value="CW">CW</option>
          <option value="CCW">CCW</option>
        </select>
        <button onclick="SetDirection()">Apply</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button onclick="Start()">Start</button>
        <button onclick="Stop()">Stop</button>
        <button onclick="Kill()">KILL</button>
      </div>
    </div>

    <div class="card">
      <h3>Status</h3>
      <div class="row">
        <span id="StatusDot" class="status-dot err"></span>
        <div id="StatusText">OFFLINE</div>
      </div>
      <div class="row small" style="margin-top:8px">
        <div>RPM(cur): <span id="RpmCur">—</span></div>
        <div style="margin-left:12px">RPM(tgt): <span id="RpmTgt">—</span></div>
      </div>
      <div class="row small" style="margin-top:8px">
        <div>Pulse Hz: <span id="PulseHz">—</span></div>
        <div style="margin-left:12px">Dir: <span id="DirValText">—</span></div>
      </div>
      <div class="row small" style="margin-top:8px">
        <div>Temp: <span id="TempText">—</span> °C</div>
        <div style="margin-left:12px">Humidity: <span id="HumText">—</span> %</div>
        <button style="margin-left:auto" onclick="ReadSensor()">Read</button>
      </div>
      <pre id="RawStatus" style="margin-top:8px; max-height:180px"></pre>
    </div>

    <div class="card">
      <h3>Environment (live)</h3>
      <canvas id="EnvChart" height="240"></canvas>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <h3>Video</h3>
    <img id="Video" src="/video.mjpg" alt="Live video" />
    <div class="small" style="margin-top:6px">Stream: /video.mjpg</div>
  </div>

<script>
  // --- Fetch helpers with basic error handling ---
  async function RequestJson(url) {
    const r = await fetch(url, {cache: "no-store"});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
  async function RequestOk(url) {
    const r = await fetch(url, {cache: "no-store"});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json().catch(_ => ({}));
  }

  // --- Controls ---
  async function SetFreqAndStart(){
    const hz = document.getElementById("FreqHz").value || "0";
    await RequestOk(`/setFreq?hz=${encodeURIComponent(hz)}&start=1`);
    await RefreshStatus();
  }
  async function SetRpm(){
    const rpm = document.getElementById("RpmVal").value || "0";
    await RequestOk(`/setRpm?rpm=${encodeURIComponent(rpm)}&start=0`);
    await RefreshStatus();
  }
  async function SetDirection(){
    const dir = document.getElementById("DirVal").value;
    await RequestOk(`/setDirection?value=${encodeURIComponent(dir)}`);
    await RefreshStatus();
  }
  async function Start(){ await RequestOk(`/start`); await RefreshStatus(); }
  async function Stop(){ await RequestOk(`/stop`); await RefreshStatus(); }
  async function Kill(){ await RequestOk(`/kill`); await RefreshStatus(); }
  async function ReadSensor(){
    const js = await RequestJson(`/sensor`);
    if (js.temp_c != null) document.getElementById("TempText").textContent = js.temp_c.toFixed(2);
    if (js.humidity != null) document.getElementById("HumText").textContent = js.humidity.toFixed(2);
  }

  // --- Status + chart ---
  const TempPoints = [];
  const HumPoints  = [];
  const TimeLabels = [];
  const ChartCtx = document.getElementById("EnvChart").getContext("2d");
  const EnvChart = new Chart(ChartCtx, {
    type: "line",
    data: {
      labels: TimeLabels,
      datasets: [
        { label: "Temp (°C)", data: TempPoints, borderColor: "#f87171", tension: 0.2 },
        { label: "Humidity (%)", data: HumPoints, borderColor: "#60a5fa", tension: 0.2 }
      ]
    },
    options: {
      animation: false, responsive: true, maintainAspectRatio: false,
      scales: { y: { suggestedMin: 0, suggestedMax: 100 } }
    }
  });

  function PushEnvPoint(t, h){
    const ts = new Date().toLocaleTimeString();
    TimeLabels.push(ts);
    TempPoints.push(t);
    HumPoints.push(h);
    if (TimeLabels.length > 60) { TimeLabels.shift(); TempPoints.shift(); HumPoints.shift(); }
    EnvChart.update();
  }

  function SetConnNote(s){ document.getElementById("ConnNote").textContent = `Backend: ${s}`; }
  function SetStatusBadge(state){
    const dot = document.getElementById("StatusDot");
    dot.classList.remove("ok", "warn", "err");
    if (state === "RUNNING") dot.classList.add("ok");
    else if (state === "STOPPED") dot.classList.add("warn");
    else dot.classList.add("err");
  }

  async function RefreshStatus(){
    try {
      const js = await RequestJson(`/status`);
      SetConnNote("online");
      document.getElementById("StatusText").textContent = js.status || "UNKNOWN";
      SetStatusBadge(js.status || "UNKNOWN");
      document.getElementById("RpmCur").textContent = js.rpm_cur != null ? js.rpm_cur.toFixed(2) : "—";
      document.getElementById("RpmTgt").textContent = js.rpm_tgt != null ? js.rpm_tgt.toFixed(2) : "—";
      document.getElementById("PulseHz").textContent = js.pulse_hz != null ? js.pulse_hz : "—";
      document.getElementById("DirValText").textContent = js.dir || "—";
      if (js.temp_c != null) document.getElementById("TempText").textContent = js.temp_c.toFixed(2);
      if (js.humidity != null) document.getElementById("HumText").textContent = js.humidity.toFixed(2);
      document.getElementById("RawStatus").textContent = JSON.stringify(js, null, 2);
      if (js.temp_c != null && js.humidity != null) PushEnvPoint(js.temp_c, js.humidity);
    } catch (e) {
      SetConnNote("offline");
      document.getElementById("StatusText").textContent = "OFFLINE";
      SetStatusBadge("OFFLINE");
    }
  }

  setInterval(RefreshStatus, 1000);
  RefreshStatus();
</script>
</body>
</html>
