<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HALO Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0f1116; --panel:#151924; --text:#e7e9ee; --muted:#aeb6c4; --accent:#3ea6ff;
      --ok:#24c08b; --warn:#ffb020; --err:#ff5c5c; --line:#20273a; --frame:#2a3246;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,"Noto Sans","Liberation Sans",sans-serif}
    header{
      padding:12px 20px;border-bottom:1px solid #22283a;background:#0d1018cc;backdrop-filter:blur(8px);
      position:sticky;top:0;z-index:5;display:flex;gap:16px;align-items:center;justify-content:space-between;
    }
    .title{font-weight:600;letter-spacing:.2px}
    .container{max-width:1200px;margin:0 auto;padding:16px}

    /* Layout: Motor (top), Environment (middle), Camera (bottom) */
    .layout{
      display:grid;gap:16px;grid-template-columns:1fr;grid-template-areas:
        "mot"
        "env"
        "cam";
    }
    @media (min-width:1000px){
      .layout{
        grid-template-columns:1fr 1fr;grid-template-areas:
          "mot env"
          "cam cam";
      }
    }

    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.03)}
    .panel h3{margin:0 0 10px 0;font-size:16px;font-weight:600;color:var(--muted)}
    .badge{font-size:12px;padding:2px 8px;border-radius:999px;background:#101525;border:1px solid #22304a;color:var(--muted)}
    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .controls input,.controls select,.controls button,.controls label{
      background:#0e1320;color:var(--text);border:1px solid var(--frame);border-radius:10px;padding:8px 10px
    }
    .controls label{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer}
    .controls input[type="checkbox"]{accent-color:#3ea6ff}
    .controls button{cursor:pointer}

    .motor-panel{grid-area:mot}
    .env-panel{grid-area:env}
    .video-panel{grid-area:cam}

    .video-frame{width:100%;aspect-ratio:16/9;border-radius:12px;border:1px solid var(--frame);
      background:#0a0c12;overflow:hidden;display:grid;place-items:center}
    .video-frame img{width:100%;height:100%;object-fit:cover;display:block}

    .uplot{background:#0a0d15;border-radius:10px;border:1px solid var(--frame)}
    .foot{color:var(--muted);font-size:12px;text-align:right;margin-top:-4px}
    .flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  </style>
  <!-- uPlot -->
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.17/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot@1.6.17/dist/uPlot.iife.min.js"></script>
</head>
<body>
  <header>
    <div class="title">HALO Dashboard</div>
    <div class="flex">
      <span id="MotorState" class="badge">motor: idle</span>
      <span id="EnvBadge" class="badge">env: --.- °C / --.- %</span>
    </div>
  </header>

  <main class="container">
    <div class="layout">

      <!-- Motor (TOP) -->
      <section class="panel motor-panel">
        <h3>Motor</h3>
        <div class="controls">
          <input id="RpmBox" type="number" step="1" placeholder="RPM">
          <button id="SetRpm">Set RPM</button>
        </div>
        <div class="controls">
          <input id="FreqBox" type="number" step="1" placeholder="Frequency (Hz)">
          <button id="SetFreq">Set Hz</button>
        </div>
        <div class="controls">
          <input id="StepsBox" type="number" step="1" placeholder="Steps">
          <button id="DoSteps">Move Steps</button>
        </div>
        <div class="controls">
          <select id="DirSel">
            <option value="CW">CW</option>
            <option value="CCW">CCW</option>
          </select>
          <button id="SetDir">Set Dir</button>
        </div>
        <div class="controls">
          <button id="StartBtn">Start</button>
          <button id="StopBtn">Stop</button>
        </div>
      </section>

      <!-- Environment (MIDDLE) -->
      <section class="panel env-panel">
        <h3>Environment</h3>
        <div class="controls" style="margin-bottom:8px">
          <label>Window
            <select id="WindowSel">
              <option value="15">15 s</option>
              <option value="30">30 s</option>
              <option value="60" selected>60 s</option>
              <option value="120">120 s</option>
              <option value="300">300 s</option>
            </select>
          </label>
          <label><input type="checkbox" id="SmoothChk" checked> Smooth</label>
          <label><input type="checkbox" id="MarkersChk"> Markers</label>
          <button id="ResetView">Reset View</button>
          <button id="SaveCsvWindow">Save CSV (window)</button>
          <button id="SaveCsvAll">Save CSV (session)</button>
          <span id="HoverReadout" class="badge">t=-- s, T=--.- °C, RH=--.- %</span>
        </div>
        <div id="EnvPlot" style="height:320px;"></div>
        <div class="foot">Wheel = zoom, drag = pan, hover = values.</div>
      </section>

      <!-- Camera (BOTTOM) -->
      <section class="panel video-panel">
        <h3>Camera (cam0)</h3>
        <div class="video-frame">
          <img id="CamView" src="/video.mjpg?ch=0" alt="Live video">
        </div>
        <div class="controls">
          <button id="ReloadCam">Reload Stream</button>
          <button id="SnapshotBtn">Snapshot</button>
          <span class="badge" id="CamSrcBadge">source: /video.mjpg?ch=0</span>
        </div>
      </section>

    </div>
  </main>

  <script>
    // ---------- helpers ----------
    async function GET(u){ const r = await fetch(u); return r.json(); }
    function downloadCsv(name, rows){
      const blob = new Blob([rows.join("\n")], {type:"text/csv"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    // ---------- motor ----------
    function setBadgeRunning(running){
      const el = document.getElementById("MotorState");
      el.textContent = running ? "motor: running" : "motor: idle";
      el.style.background = running ? "#0e1f18" : "#101525";
      el.style.borderColor = running ? "#1f614a" : "#22304a";
    }
    async function refreshStatus(){
      try{
        const s = await GET("/status");
        setBadgeRunning(!!s.running);
      }catch(e){}
    }
    setInterval(refreshStatus,1000);

    document.getElementById("SetRpm").onclick = async ()=>{
      const rpm = parseFloat(document.getElementById("RpmBox").value || "0");
      if(rpm>0) await GET(`/setRpm?rpm=${rpm}&start=1`); refreshStatus();
    };
    document.getElementById("SetFreq").onclick = async ()=>{
      const hz = parseFloat(document.getElementById("FreqBox").value || "0");
      if(hz>0) await GET(`/setFreq?hz=${hz}&start=1`); refreshStatus();
    };
    document.getElementById("DoSteps").onclick = async ()=>{
      const n = parseInt(document.getElementById("StepsBox").value || "0",10);
      if(n>0) await GET(`/setSteps?value=${n}`); refreshStatus();
    };
    document.getElementById("SetDir").onclick = async ()=>{
      const v = document.getElementById("DirSel").value;
      await GET(`/setDirection?value=${encodeURIComponent(v)}`); refreshStatus();
    };
    document.getElementById("StartBtn").onclick = async ()=>{ await GET("/start"); refreshStatus(); };
    document.getElementById("StopBtn").onclick  = async ()=>{ await GET("/stop");  refreshStatus(); };

    // ---------- camera (single cam0) ----------
    const camImg = document.getElementById("CamView");
    const camSrcBadge = document.getElementById("CamSrcBadge");
    function reloadCam(){
      const u = "/video.mjpg?ch=0&ts="+Date.now();
      camImg.src = u; camSrcBadge.textContent = "source: /video.mjpg?ch=0";
    }
    document.getElementById("ReloadCam").onclick = reloadCam;
    document.getElementById("SnapshotBtn").onclick = ()=>{
      const u = "/snapshot.jpg?ch=0&ts="+Date.now();
      const a = document.createElement("a"); a.href = u; a.download = "snapshot.jpg"; a.click();
    };
    camImg.addEventListener("error", () => setTimeout(reloadCam, 800));

    // ---------- environment plot (line, configurable window) ----------
    const plotDiv = document.getElementById("EnvPlot");
    const hoverReadout = document.getElementById("HoverReadout");
    const envBadge = document.getElementById("EnvBadge");
    const selWindow = document.getElementById("WindowSel");
    const chkSmooth = document.getElementById("SmoothChk");
    const chkMarkers = document.getElementById("MarkersChk");

    const pollMs = 1000;
    let windowS = parseInt(selWindow.value, 10);

    // live window arrays
    const X  = [];   // seconds since start
    const TC = [];
    const RH = [];

    // session arrays
    const Xall = [];
    const Tall = [];
    const RHall = [];

    const t0 = performance.now();
    const nowS = () => (performance.now() - t0)/1000;

    let xFixMin = null, xFixMax = null;

    function makeSeries(){
      return [
        {},
        {
          label:"Temp (°C)",
          width:2,
          points:{show:chkMarkers.checked},
          paths: chkSmooth.checked ? uPlot.paths.spline() : null, // null -> straight line
          spanGaps:false
        },
        {
          label:"RH (%)",
          width:2,
          scale:"y2",
          points:{show:chkMarkers.checked},
          paths: chkSmooth.checked ? uPlot.paths.spline() : null,
          spanGaps:false
        },
      ];
    }

    function buildPlot(){
      return new uPlot({
        width: plotDiv.clientWidth,
        height: 320,
        scales: { x:{time:false}, y:{auto:true}, y2:{auto:true} },
        series: makeSeries(),
        axes: [
          {label:"t (s)"},
          {label:"°C"},
          {label:"% RH", scale:"y2"},
        ],
        hooks: {
          setCursor: [(u)=>{
            const i = u.cursor.idx;
            if(i==null || i<0 || i>=X.length) return;
            const s = (X[i] ?? 0).toFixed(1);
            const t = TC[i] == null ? "--.-" : TC[i].toFixed(1);
            const h = RH[i] == null ? "--.-" : RH[i].toFixed(1);
            hoverReadout.textContent = `t=${s} s, T=${t} °C, RH=${h} %`;
          }],
        },
        plugins: [ (u)=>{
          // wheel zoom
          plotDiv.addEventListener("wheel",(e)=>{
            e.preventDefault();
            const {left} = u.bbox;
            const xu = u.posToVal(e.clientX-left,"x");
            const f = e.deltaY<0 ? 0.9 : 1.1;
            const [min,max] = u.scales.x.range(u,"x");
            xFixMin = xu - (xu-min)*f;
            xFixMax = xu + (max-xu)*f;
            u.setScale("x",{min:xFixMin,max:xFixMax});
          },{passive:false});
          // drag pan
          let dragging=false, lastX=0;
          plotDiv.addEventListener("mousedown",(e)=>{
            dragging=true; lastX=e.clientX;
            window.addEventListener("mouseup",()=>dragging=false,{once:true});
          });
          window.addEventListener("mousemove",(e)=>{
            if(!dragging) return;
            const dx = e.clientX-lastX; lastX=e.clientX;
            const valDx = u.posToVal(0,"x") - u.posToVal(dx,"x");
            const [min,max] = u.scales.x.range(u,"x");
            xFixMin = (xFixMin ?? min) + valDx;
            xFixMax = (xFixMax ?? max) + valDx;
            u.setScale("x",{min:xFixMin,max:xFixMax});
          });
        }]
      }, [X,TC,RH], plotDiv);
    }

    let uplot = buildPlot();

    function rebuildPlotKeepingData(){
      const xmin = uplot.scales.x.min, xmax = uplot.scales.x.max;
      uplot.destroy();
      uplot = buildPlot();
      uplot.setData([X,TC,RH]);
      if (xmin!=null && xmax!=null) uplot.setScale("x",{min:xmin,max:xmax});
    }

    // resize handler (debounced)
    let rAF = 0;
    window.addEventListener("resize", ()=>{
      cancelAnimationFrame(rAF);
      rAF = requestAnimationFrame(()=>uplot.setSize({width:plotDiv.clientWidth,height:320}));
    });

    function pushEnvPoint(T,H){
      const t = nowS();
      X.push(t); TC.push(T); RH.push(H);
      Xall.push(t); Tall.push(T); RHall.push(H);

      // keep window
      while (X.length && (t - X[0]) > windowS) { X.shift(); TC.shift(); RH.shift(); }

      // auto window unless user fixed x
      if (xFixMin==null || xFixMax==null){
        const xmin = Math.max(0, t - windowS);
        const xmax = Math.max(xmin + 1, t);
        uplot.setScale("x", {min:xmin, max:xmax});
      }
      uplot.setData([X,TC,RH]);
    }

    async function pollEnv(){
      try{
        const j = await GET("/sensor");
        if (j && typeof j.temp_c === "number" && typeof j.humidity === "number"){
          pushEnvPoint(j.temp_c, j.humidity);
          envBadge.textContent = `env: ${j.temp_c.toFixed(1)} °C / ${j.humidity.toFixed(1)} %`;
        }
      }catch(e){}
    }
    setInterval(pollEnv, pollMs);
    pollEnv();

    // controls
    document.getElementById("ResetView").onclick = ()=>{
      xFixMin = xFixMax = null;
      if (X.length){
        const t = X[X.length-1];
        const xmin = Math.max(0, t - windowS);
        const xmax = Math.max(xmin + 1, t);
        uplot.setScale("x", {min:xmin, max:xmax});
      }
    };

    document.getElementById("SaveCsvWindow").onclick = ()=>{
      const rows = ["t_s,temp_c,humidity"];
      for(let i=0;i<X.length;i++) rows.push(`${X[i].toFixed(3)},${TC[i]??""},${RH[i]??""}`);
      downloadCsv(`environment_last${windowS}s.csv`, rows);
    };
    document.getElementById("SaveCsvAll").onclick = ()=>{
      const rows = ["t_s,temp_c,humidity"];
      for(let i=0;i<Xall.length;i++) rows.push(`${Xall[i].toFixed(3)},${Tall[i]??""},${RHall[i]??""}`);
      downloadCsv("environment_session.csv", rows);
    };

    selWindow.addEventListener("change", ()=>{
      windowS = parseInt(selWindow.value,10);
      document.getElementById("ResetView").click();
    });
    chkSmooth.addEventListener("change", rebuildPlotKeepingData);
    chkMarkers.addEventListener("change", rebuildPlotKeepingData);
  </script>
</body>
</html>
